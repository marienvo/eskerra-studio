name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Install AppStream CLI (metainfo validation runs in npm test)
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream
      - run: npm test
      - name: Upload desktop DS Storybook (static)
        uses: actions/upload-artifact@v5
        with:
          name: storybook-ds-desktop-web
          path: packages/eskerra-ds-desktop/storybook-static/
          retention-days: 14
      - name: Upload mobile RN-Web Storybook (static)
        uses: actions/upload-artifact@v5
        with:
          name: storybook-ds-mobile-web
          path: packages/eskerra-ds-mobile/storybook-static-web/
          retention-days: 14

  node-desktop-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm run desktop:build

  desktop-rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

  ci:
    runs-on: ubuntu-latest
    if: always()
    needs: [node-test, node-desktop-build, desktop-rust]
    steps:
      - name: Require all jobs successful
        run: |
          fail=false
          if [[ "${{ needs.node-test.result }}" != "success" ]]; then
            echo "::error::node-test ended with: ${{ needs.node-test.result }}"
            fail=true
          fi
          if [[ "${{ needs.node-desktop-build.result }}" != "success" ]]; then
            echo "::error::node-desktop-build ended with: ${{ needs.node-desktop-build.result }}"
            fail=true
          fi
          if [[ "${{ needs.desktop-rust.result }}" != "success" ]]; then
            echo "::error::desktop-rust ended with: ${{ needs.desktop-rust.result }}"
            fail=true
          fi
          if [[ "$fail" == "true" ]]; then
            exit 1
          fi
          echo "All required checks passed."
